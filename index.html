<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ドットダッシュ</title>
<style>
  :root{--glow:#ffe66d;--accent:#ff8c42;--enemy:#34d399;--danger:#ff4d6d;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:#0d0820;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    color:#fff;touch-action:none;user-select:none;-webkit-user-select:none;position:fixed;inset:0;}
  canvas{position:absolute;inset:0;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges;}

  #hud{position:absolute;top:0;left:0;right:0;padding:10px 16px;display:flex;
    justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:5;}
  .meter{font-variant-numeric:tabular-nums;line-height:1;text-shadow:0 2px 0 rgba(0,0,0,.45);}
  .meter .big{font-size:clamp(24px,6vw,40px);font-weight:800;letter-spacing:-1px;color:#fff;}
  .meter .unit{font-size:.5em;font-weight:700;color:var(--glow);margin-left:2px;}
  .meter .lbl{font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.55);}
  #best{text-align:right;margin-right:42px;}
  #best .v{font-size:clamp(14px,3.5vw,18px);font-weight:800;color:var(--glow);}

  #muteBtn{position:absolute;top:8px;right:10px;z-index:8;width:34px;height:34px;border:0;
    border-radius:10px;background:rgba(13,8,32,.55);color:#fff;font-size:17px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px);}

  #adGameplay{position:absolute;top:6px;left:50%;transform:translateX(-50%);z-index:6;
    display:none;pointer-events:auto;border-radius:6px;overflow:hidden;opacity:.92;}
  #adGameplay.show{display:block;}

  .overlay{position:absolute;inset:0;z-index:10;overflow-y:auto;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:18px;gap:12px;
    background:radial-gradient(120% 90% at 50% 16%,rgba(106,46,110,.4),rgba(13,8,32,.85));}
  .overlay.hidden{display:none;}
  .title{font-size:clamp(32px,10vw,64px);font-weight:900;letter-spacing:-2px;line-height:.9;color:var(--glow);
    text-shadow:0 0 18px rgba(255,230,109,.55),0 4px 0 #c2284a,0 6px 0 rgba(0,0,0,.4);}
  .title small{display:block;font-size:.26em;letter-spacing:8px;color:var(--accent);text-shadow:none;margin-top:8px;font-weight:800;}

  .rotate{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:800;color:#0d0820;
    background:var(--glow);border-radius:30px;padding:7px 16px;box-shadow:0 4px 0 #c79b1a;}
  .rotate .ph{font-size:20px;animation:rot 2.4s ease-in-out infinite;transform-origin:center;}
  @keyframes rot{0%,40%{transform:rotate(0)}55%,85%{transform:rotate(90deg)}100%{transform:rotate(90deg)}}
  body.portrait .rotate{outline:3px solid #fff;animation:pulse 1.2s ease-in-out infinite;}
  @keyframes pulse{50%{transform:scale(1.05);}}
  .howline{font-size:11px;color:rgba(255,255,255,.6);font-weight:600;line-height:1.5;max-width:330px;}
  .howline b{color:var(--glow);}
  .howto{display:flex;flex-direction:column;gap:6px;font-size:clamp(12px,3vw,14px);font-weight:600;
    color:rgba(255,255,255,.92);background:rgba(13,8,32,.45);border:1px solid rgba(255,255,255,.12);
    border-radius:14px;padding:12px 18px;max-width:340px;}
  .howto .row{display:flex;align-items:center;gap:9px;}
  .chip{width:18px;height:18px;border-radius:5px;flex:0 0 auto;box-shadow:inset 0 -3px 0 rgba(0,0,0,.25);}
  .chip.e{background:var(--enemy);}.chip.d{background:var(--danger);}.chip.j{background:var(--glow);}

  .pick{display:flex;flex-direction:column;gap:5px;align-items:center;}
  .pick .cap{font-size:11px;font-weight:800;letter-spacing:2px;color:rgba(255,255,255,.55);}
  .seg{display:flex;gap:8px;}
  .segbtn{cursor:pointer;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);
    color:#fff;font-family:inherit;font-size:14px;font-weight:800;padding:9px 16px;border-radius:12px;
    transition:transform .07s;}
  .segbtn .sub{display:block;font-size:9px;font-weight:600;opacity:.7;letter-spacing:0;}
  .segbtn.on{background:linear-gradient(180deg,var(--accent),#e0552a);border-color:#ffb37a;box-shadow:0 3px 0 #a13315;}
  .segbtn.on.hard{background:linear-gradient(180deg,#ff4d6d,#c2284a);border-color:#ff90a5;box-shadow:0 3px 0 #8a1c38;}
  .segbtn:active{transform:translateY(2px);}

  .startBtn{cursor:pointer;border:0;font-family:inherit;color:#0d0820;font-size:19px;font-weight:900;
    letter-spacing:2px;padding:14px 44px;border-radius:40px;margin-top:4px;
    background:linear-gradient(180deg,#ffe66d,#f0b53a);box-shadow:0 5px 0 #c79b1a,0 8px 16px rgba(0,0,0,.4);
    animation:bob 1.5s ease-in-out infinite;}
  @keyframes bob{50%{transform:translateY(-5px);}}
  .startBtn:active{transform:translateY(3px);box-shadow:0 2px 0 #c79b1a;animation:none;}

  .bigover{font-size:clamp(28px,8vw,50px);font-weight:900;letter-spacing:-1px;color:#fff;text-shadow:0 4px 0 rgba(0,0,0,.4);}
  .modeTag{font-size:12px;font-weight:800;letter-spacing:2px;color:var(--accent);}
  .scorebox{display:flex;gap:30px;align-items:flex-end;justify-content:center;}
  .scorebox .col .n{font-size:clamp(26px,8vw,46px);font-weight:900;font-variant-numeric:tabular-nums;line-height:1;color:var(--glow);}
  .scorebox .col .k{font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.55);margin-top:5px;}
  .newbest{font-size:13px;font-weight:800;letter-spacing:3px;color:var(--accent);animation:blink 1s steps(2,start) infinite;}
  @keyframes blink{50%{opacity:.25;}}
  .tap{margin-top:2px;font-size:clamp(14px,3.6vw,18px);font-weight:800;letter-spacing:1px;color:#fff;
    padding:12px 28px;border-radius:40px;background:linear-gradient(180deg,var(--accent),#e0552a);
    box-shadow:0 5px 0 #a13315,0 8px 14px rgba(0,0,0,.4);animation:bob 1.4s ease-in-out infinite;cursor:pointer;}
  .ad{display:flex;justify-content:center;align-items:center;min-height:0;}
  @media (prefers-reduced-motion:reduce){.tap,.newbest,.rotate .ph,.startBtn,body.portrait .rotate{animation:none;}}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud">
  <div class="meter"><div class="lbl">DISTANCE</div><div><span class="big" id="dist">0</span><span class="unit">m</span></div></div>
  <div id="best" class="meter"><div class="lbl">BEST</div><div class="v"><span id="bestVal">0</span>m</div></div>
</div>
<button id="muteBtn">🔊</button>
<div id="adGameplay"></div>

<!-- スタート画面(トップページ) -->
<div class="overlay" id="startScreen">
  <div class="title">ドット<br>ダッシュ<small>DOT DASH</small></div>
  <div class="rotate"><span class="ph">📱</span><span>横画面でどうぞ！</span></div>
  <div class="howline">スマホを<b>横向き</b>に。出ないときは<b>自動回転をオン</b>に<br>
    （iPhone：コントロールセンターで向きロックを解除／Android：クイック設定で自動回転オン）</div>
  <div class="howto">
    <div class="row"><span class="chip j"></span><span>タップで <b>ジャンプ</b></span></div>
    <div class="row"><span class="chip e"></span><span>緑は <b>踏んでOK</b>／デカいのは踏むしかない</span></div>
    <div class="row"><span class="chip d"></span><span>赤は <b>避ける</b>／空中のヤツに注意</span></div>
  </div>
  <div class="pick"><div class="cap">難易度</div>
    <div class="seg" id="segDiff">
      <button class="segbtn on" data-v="normal">ふつう</button>
      <button class="segbtn hard" data-v="hard">むずい<span class="sub">敵増加・ギリギリ</span></button>
    </div>
  </div>
  <div class="pick"><div class="cap">スピード</div>
    <div class="seg" id="segSpeed">
      <button class="segbtn on" data-v="steady">一定<span class="sub">のんびり長く</span></button>
      <button class="segbtn" data-v="accel">だんだん加速</button>
    </div>
  </div>
  <button class="startBtn" id="startBtn">START</button>
  <div class="ad" id="adStart"></div>
</div>

<!-- ゲームオーバー -->
<div class="overlay hidden" id="overScreen">
  <div class="bigover">GAME OVER</div>
  <div class="modeTag" id="overMode"></div>
  <div class="scorebox">
    <div class="col"><div class="n" id="finalDist">0</div><div class="k">DISTANCE m</div></div>
    <div class="col"><div class="n" id="finalBest">0</div><div class="k">BEST m</div></div>
  </div>
  <div class="newbest" id="newBest" style="display:none;">★ NEW RECORD ★</div>
  <div class="tap" id="retryBtn">タップでリトライ</div>
  <div class="ad" id="adOver"></div>
</div>

<script>
"use strict";
(function(){
  const canvas=document.getElementById('game'), ctx=canvas.getContext('2d');
  const LH=180; let LW=320;
  function resize(){
    const cssW=window.innerWidth, cssH=window.innerHeight;
    LW=Math.max(200,Math.round(LH*(cssW/cssH)));
    canvas.width=LW; canvas.height=LH;
    player.x=Math.round(LW*0.24);
    document.body.classList.toggle('portrait', cssH>cssW);
  }
  window.addEventListener('resize',resize);
  window.addEventListener('orientationchange',()=>setTimeout(resize,200));

  /* 物理・地形 */
  const GROUND=150, GRAV=0.62, JUMP_V=-8.6, PPM=7;
  function terrainY(wx){ return GROUND - Math.sin(wx*0.005)*12 - Math.sin(wx*0.016+1.0)*4; }

  const player={x:70,y:0,vy:0,w:14,h:15,onGround:true,coyote:0,runFrame:0,runTimer:0,alive:true};

  /* パレット */
  const PAL={'Y':'#ffe66d','y':'#f0b53a','K':'#3a2540','W':'#ffffff','O':'#ff8c42',
    'C':'#34d399','c':'#159b78','R':'#ff4d6d','r':'#c2284a','M':'#a64dff','m':'#6a2caa',
    'B':'#7fd4ff','b':'#3a86c0','G':'#9aa0b0','g':'#5a606e','N':'#2a2030'};

  /* スプライト */
  const HERO_A=["................",".......KKKK.....",".....KKYYYYKK...","....KYYYYYYYYK..","...KYYYYYYYYYYK.","...KYYYYYWWKYK..","OOKYYYYYYWWKYK..","OOKYYYYYYYYKYK..",".OKYYYYYYYYYYK..","..KYYYYYYYYYYK..","..KyYYYYYYYYyK..","...KyYYYYYYyK...","....KKyyyyKK....",".....K..K.K.....","....KK...KK.....","................"];
  const HERO_B=["................",".......KKKK.....",".....KKYYYYKK...","....KYYYYYYYYK..","...KYYYYYYYYYYK.","...KYYYYYWWKYK..","OOKYYYYYYWWKYK..","OOKYYYYYYYYKYK..",".OKYYYYYYYYYYK..","..KYYYYYYYYYYK..","..KyYYYYYYYYyK..","...KyYYYYYYyK...","....KKyyyyKK....","......KKKK......",".....KK..KK.....","................"];
  const HERO_JUMP=["................",".......KKKK.....",".....KKYYYYKK...","....KYYYYYYYYK..","..OKYYYYYYYYYYK.","OOKYYYYYWWKYK...","OOKYYYYYYWWKYK..",".OKYYYYYYYYKYK..","..KYYYYYYYYYYK..","..KYYYYYYYYYYK..","..KyYYYYYYYYyK..","...KyYYYYYYyK...","...KKyyyyyyKK...","..KK......KK....","................","................"];
  const SLIME=["....CCCC....","..CCCCCCCC..",".CCCCCCCCCC.",".CCKWCCKWCC.",".CCKKCCKKCC.","CCCCCCCCCCCC","CcCCCCCCCCcC","CccccccccccC",".cccccccccc."];
  const BIGSLIME=["......CCCCCC......","....CCCCCCCCCC....","...CCCCCCCCCCCC...","..CCCCCCCCCCCCCC..",".CCCCCCCCCCCCCCCC.",".CCCCCCCCCCCCCCCC.",".CCCKWCCCCCCKWCCC.",".CCCKKCCCCCCKKCCC.","CCCCCCCCCCCCCCCCCC","CCCCCCCCCCCCCCCCCC","CCCCCCCCCCCCCCCCCC","CcCCCCCCCCCCCCCCcC","CcCCCCCCCCCCCCCCcC","CccCCCCCCCCCCCCccC","CccccccccccccccccC",".cccccccccccccccc."];
  // 少し大きいスライム(踏める) 18x22
  const TALLSLIME=["......CCCCCC......","....CCCCCCCCCC....","...CCCCCCCCCCCC...","..CCCCCCCCCCCCCC..",".CCCCCCCCCCCCCCCC.",".CCCKWCCCCCCKWCCC.",".CCCKKCCCCCCKKCCC.",".CCCCCCCCCCCCCCCC.","CCCCCCCCCCCCCCCCCC","CCCCCCCCCCCCCCCCCC","CCCCCCCCCCCCCCCCCC","CCCCCCCCCCCCCCCCCC","CCCCCCCCCCCCCCCCCC","CcCCCCCCCCCCCCCCcC","CcCCCCCCCCCCCCCCcC","CcCCCCCCCCCCCCCCcC","CccCCCCCCCCCCCCccC","CccCCCCCCCCCCCCccC","CcccCCCCCCCCCCcccC","CccccccccccccccccC",".cccccccccccccccc.","..cccccccccccccc.."];
  // 背の高い敵・ジャンプ頂点で踏む(踏める) 16x40
  const TOWER=["......CCCC......","....CCCCCCCC....","..CCCCCCCCCCCC..",".CCCCCCCCCCCCCC.",".CCCKWCCCCKWCCC.",".CCCKKCCCCKKCCC.",".CCCCCCCCCCCCCC.","CCCCCCCCCCCCCCCC","CCCCCCCCCCCCCCCC","CcCCCCCCCCCCCCcC","CcCCCCCCCCCCCCcC","CCCCCCCCCCCCCCCC","CCCCCCCCCCCCCCCC","CcCCCCCCCCCCCCcC","CcCCCCCCCCCCCCcC","CCCCCCCCCCCCCCCC","CCCCCCCCCCCCCCCC","CcCCCCCCCCCCCCcC","CcCCCCCCCCCCCCcC","CCCCCCCCCCCCCCCC","CCCCCCCCCCCCCCCC","CcCCCCCCCCCCCCcC","CcCCCCCCCCCCCCcC","CCCCCCCCCCCCCCCC","CCCCCCCCCCCCCCCC","CcCCCCCCCCCCCCcC","CcCCCCCCCCCCCCcC","CCCCCCCCCCCCCCCC","CCCCCCCCCCCCCCCC","CcCCCCCCCCCCCCcC","CcCCCCCCCCCCCCcC","CCCCCCCCCCCCCCCC","CcCCCCCCCCCCCCcC","CccCCCCCCCCCCccC","CccccccccccccccC","CccccccccccccccC","cccccccccccccccc","cccccccccccccccc",".cccccccccccccc.","..cccccccccccc.."];
  // 避ける障害物 見た目バリエ(全部 8x14)
  const SPIKE_R=["...WW...","...RR...","..RRRR..","..RRRR..",".RRRRRR.",".RRrrRR.",".RRrrRR.","RRRrrRRR","RRRrrRRR","RRrrrrRR","RRrrrrRR","RrrrrrrR","RrrrrrrR","rrrrrrrr"];
  const SPIKE_M=["...WW...","...MM...","..MMMM..","..MMMM..",".MMMMMM.",".MMmmMM.",".MMmmMM.","MMMmmMMM","MMMmmMMM","MMmmmmMM","MMmmmmMM","MmmmmmmM","MmmmmmmM","mmmmmmmm"];
  const PILLAR=["GGGGGGGG","GgggggGG","GgWWWggG","GgWGGggG","GggGGggG","GggGGggG","GgggggGG","GgggggGG","GggggggG","GggggggG","gggggggg","gNNNNNNg","gNggggNg","NNNNNNNN"];
  const BONE=["..WWWW..",".WWWWWW.","WWggggWW","WgggggWW","WWggggWW",".WWWWWW.","..WWWW..","..WWWW..","..WWWW..",".WWWWWW.","WWggggWW","WgggggWW","WWggggWW",".WWWWWW."];
  // 大障害物 見た目バリエ(16x20)
  const ROCK_M=["...RR......RR...","...RR......RR...","..MRRM....MRRM..","..MRRM....MRRM..","..MRRM...MMRRM..",".MMRRMM..MMRRMM.",".MMRRMM..MMRRMM.",".MMRRMM.MMMRRMM.",".MMRRMMMMMMRRMM.","MMMRRMMMMMMMRRMM","MMMMMMMMMMMMMMMM","MMMmMMMMMMMmMMMM","MMmmMMMMMMmmMMMM","MmmmmMMMMmmmmMMM","MmmmmmMMmmmmmMMM","mmmmmmmmmmmmmmMM","mmmmmmmmmmmmmmmM","mmmmmmmmmmmmmmmm","mmmmmmmmmmmmmmmm","mmmmmmmmmmmmmmmm"];
  const ROCK_B=["......RR........",".....RRRR.......","....RRRRRR......","...RRRRRRRR.....","..BBRRRRRRBB....","..BBBRRRRBBB....",".BBBBRRRRBBBB...",".BBBBBRRBBBBB...","BBBBBBBBBBBBBB..","BBBBBBBBBBBBBB..","BBBBbbbbBBBBBB..","BBBbbbbbbBBBBB..","BBbbbbbbbbBBBB..","BBbbbbbbbbbBBB..","BbbbbbbbbbbbBB..","BbbbbbbbbbbbbB..","bbbbbbbbbbbbbb..","bbbbbbbbbbbbbb..","bbbbbbbbbbbbbb..","bbbbbbbbbbbbbb.."];
  // 浮遊危険物(12x10)
  const FLOATER=["..RR....RR..",".RRRR..RRRR.","RRRRRRRRRRRR","RRRWWRRWWRRR","RRWKWRRWKWRR","RRRWWRRWWRRR","RRRRRRRRRRRR",".RRRRRRRRRR.","..RRRRRRRR..","...RrrrR...."];

  function drawSprite(map,ox,oy,flip){
    for(let r=0;r<map.length;r++){const row=map[r];
      for(let c=0;c<row.length;c++){const ch=row[c]; if(ch===' '||ch==='.')continue;
        const col=PAL[ch]; if(!col)continue;
        const px=flip?ox+(row.length-1-c):ox+c;
        ctx.fillStyle=col; ctx.fillRect(px,oy+r,1,1);}}
  }

  /* タイプ定義 (避ける系はsprites配列から見た目ランダム) */
  const TYPES={
    spike:    {w:8, h:14,stomp:false,yo:14,big:false,sprites:[SPIKE_R,SPIKE_M,PILLAR,BONE]},
    rock:     {w:16,h:20,stomp:false,yo:20,big:true, sprites:[ROCK_M,ROCK_B]},
    slime:    {w:12,h:9, stomp:true, yo:9, big:false,sprites:[SLIME]},
    bigslime: {w:18,h:16,stomp:true, yo:16,big:true, sprites:[BIGSLIME]},
    tallslime:{w:18,h:22,stomp:true, yo:22,big:true, sprites:[TALLSLIME]},   // 少し大きい
    tower:    {w:16,h:40,stomp:true, yo:40,big:true, tall:true,sprites:[TOWER]}, // 背高・踏むしかない
    floater:  {w:12,h:10,stomp:false,yo:42,big:false,air:true,sprites:[FLOATER]},
    mover:    {w:12,h:9, stomp:true, yo:9, big:false,move:'patrol',sprites:[SLIME]}, // 前後に動く
    hopper:   {w:12,h:9, stomp:true, yo:9, big:false,move:'hop',sprites:[SLIME]}     // ジャンプする
  };

  /* 状態 */
  let obstacles=[],particles=[];
  let speed=2.0,distance=0,spawnGap=80;
  let state='menu',bgScroll=0,groundScroll=0,best=0,overCooldown=0;
  let accelMode=false,hardMode=false,lastKind='';
  let dayTime=0.80;                 // 夕焼けから開始
  try{best=parseInt(localStorage.getItem('dotdash_best')||'0',10)||0;}catch(e){}

  /* ===== サウンド(WebAudio) ===== */
  let actx=null,master=null,muted=false,bgmTimer=null,bgmStep=0;
  function audioInit(){
    if(actx) return;
    try{
      actx=new (window.AudioContext||window.webkitAudioContext)();
      master=actx.createGain(); master.gain.value=muted?0:0.45; master.connect(actx.destination);
    }catch(e){ actx=null; }
  }
  function tone(freq,dur,type,vol,slideTo){
    if(!actx||muted||document.hidden) return;
    const o=actx.createOscillator(),g=actx.createGain(),t=actx.currentTime;
    o.type=type||'square'; o.frequency.setValueAtTime(freq,t);
    if(slideTo) o.frequency.linearRampToValueAtTime(slideTo,t+dur);
    g.gain.setValueAtTime(vol||0.25,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g); g.connect(master); o.start(t); o.stop(t+dur+0.02);
  }
  const sfxJump =()=>tone(420,0.16,'square',0.22,780);
  const sfxStomp=()=>{tone(280,0.07,'square',0.28,560); setTimeout(()=>tone(720,0.1,'square',0.22,1100),45);};
  const sfxBonus=()=>{tone(660,0.07,'square',0.22); setTimeout(()=>tone(990,0.1,'square',0.22),70);};
  const sfxOver =()=>{tone(320,0.5,'sawtooth',0.28,70); setTimeout(()=>tone(160,0.4,'square',0.2,60),120);};
  // BGM: ペンタトニックの軽快リフ + ベース + 4つ打ち
  const N={C:261.63,D:293.66,E:329.63,G:392.0,A:440.0,c:523.25,d:587.33,e:659.25,g:783.99,a:880.0,o:0};
  const MEL=[N.e,N.o,N.g,N.e, N.d,N.o,N.c,N.d, N.e,N.g,N.a,N.g, N.e,N.d,N.c,N.o,
             N.c,N.o,N.d,N.e, N.g,N.o,N.e,N.d, N.c,N.D,N.E,N.G, N.A,N.o,N.G,N.o];
  const BASS=[130.81,0,130.81,0, 110.0,0,110.0,0, 87.31,0,87.31,0, 98.0,0,98.0,0,
              130.81,0,130.81,0, 110.0,0,110.0,0, 87.31,0,87.31,0, 98.0,0,98.0,98.0];
  function bgmStart(){
    if(bgmTimer||!actx) return; bgmStep=0; const stepMs=145;
    bgmTimer=setInterval(()=>{
      if(!actx||muted||document.hidden){ bgmStep++; return; }
      const m=MEL[bgmStep%MEL.length]; if(m) tone(m,stepMs/1000*0.85,'square',0.10);
      const b=BASS[bgmStep%BASS.length]; if(b) tone(b,stepMs/1000*0.9,'triangle',0.16);
      if(bgmStep%2===0) tone(90,0.08,'sine',0.22,45);   // キック
      bgmStep++;
    },stepMs);
  }
  const muteBtn=document.getElementById('muteBtn');
  function setMute(m){ muted=m; if(master) master.gain.value=muted?0:0.45; muteBtn.textContent=muted?'🔇':'🔊'; }
  muteBtn.addEventListener('click',(e)=>{e.stopPropagation(); audioInit(); setMute(!muted); if(!muted) bgmStart();});

  function reset(){
    obstacles=[];particles=[]; distance=0; spawnGap=80; lastKind='';
    if(hardMode) speed=accelMode?2.6:2.7; else speed=accelMode?2.0:2.0;
    bgScroll=0; groundScroll=0;
    player.vy=0; player.onGround=true; player.coyote=0; player.alive=true;
    player.y=terrainY(player.x)-player.h;
  }

  /* スポーン */
  function pickKind(){
    const d=distance, table=[];
    table.push(['slime', d<150?38:24]);
    table.push(['spike', d<150?58:30]);
    const gate=hardMode?90:130;
    if(d>=gate){ table.push(['bigslime',13]); table.push(['tallslime',13]); table.push(['rock',14]); }
    if(d>=(hardMode?150:260)) table.push(['floater',hardMode?13:11]);
    if(hardMode && d>=110){ table.push(['tower',11]); table.push(['mover',13]); table.push(['hopper',13]); }
    // 同種の連続を抑制
    const noRepeat=['floater','tower','mover','hopper'];
    let total=0; for(const t of table){ if(noRepeat.includes(t[0])&&lastKind===t[0])t[1]=0; total+=t[1]; }
    let roll=Math.random()*total;
    for(const t of table){ roll-=t[1]; if(roll<=0) return t[0]; }
    return 'spike';
  }
  function makeObs(kind,wx){
    const def=TYPES[kind];
    const sp = def.sprites ? def.sprites[(Math.random()*def.sprites.length)|0] : null;
    const o={kind,wx,w:def.w,h:def.h,dead:false,anim:Math.random()*10,sprite:sp};
    if(def.move==='patrol') o.amp=12+Math.random()*8;
    if(def.move==='hop'){ o.hop=0; o.hopV=0; o.hopWait=Math.random()*40; }
    return o;
  }
  function spawn(){
    const kind=pickKind(), def=TYPES[kind], baseWx=groundScroll+LW+8;
    if(kind==='spike'){ const n=1+((Math.random()*3)|0); for(let i=0;i<n;i++) obstacles.push(makeObs(kind,baseWx+i*8)); }
    else obstacles.push(makeObs(kind,baseWx));
    const air=2*Math.abs(JUMP_V)/GRAV;
    let minGap=speed*air*0.6+30;
    if(hardMode) minGap*=0.8;
    if(def.big) minGap+=16;
    if(def.tall) minGap+=24;                  // 背高は飛ぶ準備に余白
    if(def.move) minGap+=14;                   // 動く敵も少し余白
    if(kind==='floater'||lastKind==='floater') minGap+=26;
    spawnGap=minGap+Math.random()*(50+speed*6);
    lastKind=kind;
  }

  /* 入力 */
  function doJump(){ if(player.onGround||player.coyote>0){ player.vy=JUMP_V; player.onGround=false; player.coyote=0; sfxJump(); } }
  function tap(){ if(state==='play') doJump(); else if(state==='over'){ if(overCooldown<=0) startGame(); } }
  window.addEventListener('pointerdown',function(e){ if(state==='menu') return; e.preventDefault(); tap(); },{passive:false});
  window.addEventListener('keydown',function(e){ if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW'){ e.preventDefault(); if(state==='menu') startGame(); else tap(); } });

  /* モード選択UI */
  let selDiff='normal', selSpeed='steady';
  function bindSeg(id,setter){
    const seg=document.getElementById(id);
    seg.addEventListener('click',(e)=>{
      const b=e.target.closest('.segbtn'); if(!b) return;
      [...seg.children].forEach(c=>c.classList.remove('on'));
      b.classList.add('on'); setter(b.dataset.v);
    });
  }
  bindSeg('segDiff',v=>selDiff=v);
  bindSeg('segSpeed',v=>selSpeed=v);
  document.getElementById('startBtn').addEventListener('click',(e)=>{e.stopPropagation(); startGame();});
  document.getElementById('retryBtn').addEventListener('click',(e)=>{e.stopPropagation(); if(overCooldown<=0) startGame();});

  const startScreen=document.getElementById('startScreen'), overScreen=document.getElementById('overScreen'), adGameplay=document.getElementById('adGameplay');
  function startGame(){
    hardMode=(selDiff==='hard'); accelMode=(selSpeed==='accel');
    audioInit(); bgmStart();
    reset(); state='play';
    startScreen.classList.add('hidden'); overScreen.classList.add('hidden'); adGameplay.classList.add('show');
  }
  function gameOver(){
    state='over'; overCooldown=30; player.alive=false; adGameplay.classList.remove('show'); sfxOver();
    const d=Math.floor(distance); let isNew=false;
    if(d>best){ best=d; isNew=true; try{localStorage.setItem('dotdash_best',String(best));}catch(e){} }
    document.getElementById('finalDist').textContent=d;
    document.getElementById('finalBest').textContent=best;
    document.getElementById('bestVal').textContent=best;
    document.getElementById('overMode').textContent=(hardMode?'高難易度':'ふつう')+'・'+(accelMode?'だんだん加速':'一定速度');
    document.getElementById('newBest').style.display=isNew?'block':'none';
    overScreen.classList.remove('hidden'); injectAd('adOver',300,250,AD_BIG);
    for(let i=0;i<16;i++) particles.push({x:player.x+7,y:player.y+7,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.7)*5,life:30,col:Math.random()<0.5?'#ffe66d':'#ff8c42'});
  }
  function hit(a,ox,oy,ow,oh){ return a.x<ox+ow && a.x+a.w>ox && a.y<oy+oh && a.y+a.h>oy; }

  /* 更新 */
  function update(dt){
    dayTime=(dayTime+dt*(1/(60*150)))%1;     // 約150秒で一日一周
    if(overCooldown>0) overCooldown-=dt;
    if(state!=='play'){ bgScroll+=0.3*dt; groundScroll+=0.3*dt; stepParticles(dt); return; }
    if(accelMode) speed=Math.min(hardMode?5.2:4.0,(hardMode?2.6:2.0)+distance*(hardMode?0.0020:0.0016));
    else speed=hardMode?2.7:2.0;
    const mv=speed*dt; bgScroll+=mv; groundScroll+=mv; distance+=mv/PPM;

    const gy=terrainY(groundScroll+player.x);
    player.vy+=GRAV*dt; player.y+=player.vy*dt;
    if(player.onGround) player.coyote=6; else if(player.coyote>0) player.coyote-=dt;
    if(player.y+player.h>=gy){ player.y=gy-player.h; player.onGround=true; player.vy=0; }
    else player.onGround=false;
    player.runTimer+=dt; if(player.runTimer>5){ player.runTimer=0; player.runFrame^=1; }

    spawnGap-=mv; if(spawnGap<=0) spawn();

    const pb={x:player.x+2,y:player.y+1,w:player.w-4,h:player.h-2};
    for(const o of obstacles){
      o.anim+=dt; const def=TYPES[o.kind];
      if(def.move==='hop'){            // ジャンプする敵の物理
        if(o.hop<=0 && o.hopWait<=0){ o.hopV=4.4; o.hopWait=35+Math.random()*45; }
        if(o.hopWait>0) o.hopWait-=dt;
        o.hop+=o.hopV*dt; o.hopV-=0.42*dt; if(o.hop<0){ o.hop=0; o.hopV=0; }
      }
      const p=obsPos(o,def), ox=p.ox, oy=p.oy;
      if(o.dead){ o.deadT+=dt; continue; }
      if(!hit(pb,ox+1,oy+1,o.w-2,o.h-1)) continue;
      if(def.stomp){
        const footOnTop=player.vy>0 && (pb.y+pb.h)<=(oy+o.h*0.7);
        if(footOnTop){
          o.dead=true; o.deadT=0; player.vy=JUMP_V*0.66; player.onGround=false;
          distance+=def.big?4:2; (def.big?sfxBonus:sfxStomp)();
          const cx=ox+o.w/2; for(let i=0;i<(def.big?12:8);i++) particles.push({x:cx,y:oy+3,vx:(Math.random()-0.5)*3,vy:-Math.random()*3,life:22,col:'#34d399'});
        } else return gameOver();
      } else return gameOver();
    }
    obstacles=obstacles.filter(o=>(o.wx-groundScroll)+o.w>-14 && !(o.dead&&o.deadT>14));
    stepParticles(dt);
  }
  function stepParticles(dt){ for(const p of particles){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=0.35*dt; p.life-=dt; } particles=particles.filter(p=>p.life>0); }

  /* ===== 描画 ===== */
  function h2r(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
  function r2h(r){return "#"+r.map(v=>Math.round(Math.max(0,Math.min(255,v))).toString(16).padStart(2,"0")).join("");}
  function lh(a,b,t){const A=h2r(a),B=h2r(b);return r2h([A[0]+(B[0]-A[0])*t,A[1]+(B[1]-A[1])*t,A[2]+(B[2]-A[2])*t]);}
  function L(a,b,t){return a+(b-a)*t;}
  const SKY=[
   {t:0.00,top:"#0a0a25",mid:"#101a3a",low:"#1a2a4a",hor:"#2a3a5a",amb:0.55,moon:true},
   {t:0.18,top:"#1a1a44",mid:"#4a3a6a",low:"#b05a6a",hor:"#ffb37a",amb:0.16,moon:false},
   {t:0.34,top:"#2f63cc",mid:"#5a9ae0",low:"#a8d0f0",hor:"#ffe8c0",amb:0.0,moon:false},
   {t:0.50,top:"#1f7ad8",mid:"#4aa0e8",low:"#bfe2f5",hor:"#eaf6ff",amb:0.0,moon:false},
   {t:0.66,top:"#2a3a80",mid:"#8a4a8a",low:"#e07a5a",hor:"#ffc06a",amb:0.04,moon:false},
   {t:0.80,top:"#1a1140",mid:"#5a2470",low:"#c0407a",hor:"#ff7e5f",amb:0.10,moon:false},
   {t:0.92,top:"#100a2a",mid:"#2a1845",low:"#5a2a55",hor:"#9a4a5a",amb:0.40,moon:true},
   {t:1.00,top:"#0a0a25",mid:"#101a3a",low:"#1a2a4a",hor:"#2a3a5a",amb:0.55,moon:true}
  ];
  function skyNow(t){
    let i=0; while(i<SKY.length-1 && t>=SKY[i+1].t) i++;
    const a=SKY[i],b=SKY[Math.min(i+1,SKY.length-1)],sp=(b.t-a.t)||1,k=(t-a.t)/sp;
    return {top:lh(a.top,b.top,k),mid:lh(a.mid,b.mid,k),low:lh(a.low,b.low,k),hor:lh(a.hor,b.hor,k),
      amb:L(a.amb,b.amb,k),moon:k<0.5?a.moon:b.moon};
  }
  let sky=skyNow(0.80);

  function drawBG(){
    sky=skyNow(dayTime);
    const g=ctx.createLinearGradient(0,0,0,LH);
    g.addColorStop(0,sky.top); g.addColorStop(0.42,sky.mid); g.addColorStop(0.72,sky.low);
    g.addColorStop(0.90,sky.hor); g.addColorStop(1,sky.hor);
    ctx.fillStyle=g; ctx.fillRect(0,0,LW,LH);
    // 星(夜のみ)
    if(sky.amb>0.12){ ctx.fillStyle='rgba(255,255,255,'+Math.min(0.85,sky.amb*1.3)+')';
      for(let i=0;i<30;i++) ctx.fillRect((i*53+17)%LW,(i*29)%80,1,1); }
    // 天体(昼=太陽の弧 / 夜=月)
    const sp=(dayTime-0.18)/0.62;
    if(sp>=0&&sp<=1){
      const sx=LW*(0.08+0.84*sp), sy=132-Math.sin(sp*Math.PI)*100;
      ctx.fillStyle='#ffd45e'; ctx.beginPath(); ctx.arc(sx,sy,12,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,224,109,.16)'; ctx.beginPath(); ctx.arc(sx,sy,20,0,Math.PI*2); ctx.fill();
    } else if(sky.moon){
      const mx=LW*0.78, my=40;
      ctx.fillStyle='#eaf0ff'; ctx.beginPath(); ctx.arc(mx,my,10,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=sky.top; ctx.beginPath(); ctx.arc(mx+4,my-3,9,0,Math.PI*2); ctx.fill();
    }
    drawHills(bgScroll*0.18,118,sky.mid,46,70,0.5);
    drawHills(bgScroll*0.42,132,sky.low,30,48,0.7);
  }
  function drawHills(scroll,baseY,col,amp,period,dark){
    ctx.fillStyle=lh(col,'#100a20',dark); ctx.beginPath(); ctx.moveTo(0,LH);
    const off=scroll%period;
    for(let x=-period;x<=LW+period;x+=2){ const t=(x+off)/period; const y=baseY-Math.abs(Math.sin(t*1.3))*amp*(0.6+0.4*Math.sin(t*0.7)); ctx.lineTo(x,y); }
    ctx.lineTo(LW,LH); ctx.closePath(); ctx.fill();
  }
  function drawGround(){
    for(let sx=0;sx<LW;sx++){
      const wx=groundScroll+sx, ty=terrainY(wx);
      ctx.fillStyle='#2a1530'; ctx.fillRect(sx,ty,1,LH-ty);
      ctx.fillStyle='#7a3d6e'; ctx.fillRect(sx,ty,1,2);
      ctx.fillStyle='#ff8c42'; ctx.fillRect(sx,ty,1,1);
      const w=Math.floor(wx);
      if(w%8===0){ ctx.fillStyle='rgba(255,255,255,.08)'; ctx.fillRect(sx,ty+6,2,1); }
      if(w%8===4){ ctx.fillStyle='rgba(0,0,0,.12)'; ctx.fillRect(sx,ty+12,1,1); }
    }
  }
  // 敵の実効表示位置(前後移動・ジャンプを反映)
  function obsPos(o,def){
    let ox=o.wx-groundScroll, oy=terrainY(o.wx)-def.yo;
    if(def.move==='patrol') ox+=Math.sin(o.anim*0.06)*(o.amp||14);
    if(def.move==='hop') oy-=(o.hop||0);
    return {ox,oy};
  }
  function drawObstacles(){
    for(const o of obstacles){
      const def=TYPES[o.kind], p=obsPos(o,def), ox=Math.round(p.ox), oy=Math.round(p.oy);
      if(def.stomp&&o.dead){ ctx.fillStyle='#159b78'; const sh=Math.max(1,(def.big?7:5)-o.deadT*0.3); ctx.fillRect(ox,Math.round(terrainY(o.wx))-sh,o.w,sh); continue; }
      let bob=0;
      if(def.move==='hop') bob=0;
      else if(def.stomp) bob=Math.sin(o.anim*0.25);
      else if(def.air) bob=Math.sin(o.anim*0.18)*3;
      drawSprite(o.sprite,ox,Math.round(oy+bob),false);
    }
  }
  function drawPlayer(){ if(!player.alive) return; const map=!player.onGround?HERO_JUMP:(player.runFrame?HERO_B:HERO_A); drawSprite(map,Math.round(player.x)-1,Math.round(player.y)-1,false); }
  function drawParticles(){ for(const p of particles){ ctx.globalAlpha=Math.max(0,Math.min(1,p.life/14)); ctx.fillStyle=p.col; ctx.fillRect(Math.round(p.x),Math.round(p.y),2,2);} ctx.globalAlpha=1; }
  function render(){
    ctx.clearRect(0,0,LW,LH);
    drawBG(); drawGround(); drawObstacles(); drawPlayer(); drawParticles();
    if(sky.amb>0){ ctx.fillStyle='rgba(8,6,24,'+sky.amb+')'; ctx.fillRect(0,0,LW,LH); }   // 夜の暗さ
    if(state==='play') document.getElementById('dist').textContent=Math.floor(distance);
  }

  let last=performance.now();
  function loop(now){ let dt=(now-last)/16.667; last=now; if(dt>2.5)dt=2.5; if(!document.hidden){ update(dt); render(); } requestAnimationFrame(loop); }

  /* ===== 忍者AdMax =====
     iframeで隔離。トップ/オーバーは大広告、ゲーム中は小広告。 */
  const AD_BIG='https://adm.shinobi.jp/s/ab22e328b2cf8b2f0542defdac33ca6e';
  const AD_SMALL='https://adm.shinobi.jp/s/0c1a588ff8b8c8bfc778bdf03fcfa267';
  function injectAd(containerId,w,h,src){
    const c=document.getElementById(containerId); if(!c||c.dataset.loaded) return; c.dataset.loaded='1';
    const ad=document.createElement('iframe'); ad.width=w; ad.height=h; ad.scrolling='no';
    ad.style.cssText='border:0;overflow:hidden;background:transparent;display:block;';
    ad.srcdoc='<!DOCTYPE html><html><head><meta charset="utf-8">'+
      '<style>body{margin:0;display:flex;justify-content:center;align-items:center;}</style></head>'+
      '<body><!-- admax --><scr'+'ipt src="'+src+'"><\/scr'+'ipt><!-- admax --></body></html>';
    c.appendChild(ad);
  }

  /* 起動 */
  document.getElementById('bestVal').textContent=best;
  resize(); player.y=terrainY(player.x)-player.h;
  injectAd('adStart',300,250,AD_BIG);
  injectAd('adGameplay',320,50,AD_SMALL);
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
